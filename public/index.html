<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="IDSTS — Secure Document Management System. Login to manage your encrypted documents.">
  <title>IDSTS — Login</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🔒</div>
        <h1>IDSTS</h1>
        <p>Intelligent Document Security & Tracking System</p>
      </div>

      <form class="auth-form" id="login-form">
        <div class="form-group">
          <label class="form-label" for="login-username">Username</label>
          <input type="text" class="form-input" id="login-username" name="username"
                 placeholder="Enter your username" required autocomplete="username" autofocus>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" class="form-input" id="login-password" name="password"
                 placeholder="Enter your password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary" id="btn-login">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
