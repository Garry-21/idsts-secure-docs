<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your IDSTS account for secure document management.">
  <title>IDSTS — Register</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🔒</div>
        <h1>IDSTS</h1>
        <p>Create your secure account</p>
      </div>

      <form class="auth-form" id="register-form">
        <div class="form-group">
          <label class="form-label" for="reg-username">Username</label>
          <input type="text" class="form-input" id="reg-username" name="username"
                 placeholder="Choose a username" required autocomplete="username" autofocus>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-email">Email</label>
          <input type="email" class="form-input" id="reg-email" name="email"
                 placeholder="your@email.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input type="password" class="form-input" id="reg-password" name="password"
                 placeholder="Minimum 6 characters" required minlength="6" autocomplete="new-password">
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-confirm-password">Confirm Password</label>
          <input type="password" class="form-input" id="reg-confirm-password" name="confirmPassword"
                 placeholder="Repeat your password" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary" id="btn-register">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/index.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
